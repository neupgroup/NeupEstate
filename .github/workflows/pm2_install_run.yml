name: Install and Run PM2 Server

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "YES" to confirm full reinstall'
        required: true
        default: 'NO'

jobs:
  deploy:
    if: github.event.inputs.confirm == 'YES'   # Run only if user types YES
    runs-on: ubuntu-latest

    steps:
      - name: Deploy and Manage Node.js App with PM2
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            # Check if pm2 is installed
            if ! command -v pm2 > /dev/null 2>&1; then
              echo "⚡ PM2 not found. Installing globally..."
              npm install -g pm2
            else
              echo "✅ PM2 already installed."
            fi

            cd ${{ secrets.DEPLOY_PATH }}

            # Restart if app_001 exists, else start fresh
            if pm2 describe app_001 > /dev/null 2>&1; then
              echo "🔄 Restarting existing PM2 process 'app_001'..."
              pm2 restart app_001
            else
              echo "🚀 Starting PM2 process 'app_001'..."
              pm2 start ecosystem.config.js --name app_001
            fi

            pm2 save
          EOF
