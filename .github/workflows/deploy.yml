name: Clean Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Key
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync Clean Code to Server (No Node Modules)
        run: |
          set -e
          rsync -avz --delete \
            --exclude '.pm2' \
            --exclude '.npm' \
            --exclude 'node_modules' \
            --exclude '.ssh' \
            --exclude 'keys' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Clean Install and Restart PM2
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.DEPLOY_PATH }}

            echo "🔄 Cleaning existing modules and lock file"
            rm -rf node_modules package-lock.json

            echo "📦 Installing fresh production-only dependencies"
            npm install --production

            echo "🚀 Restarting PM2 process"
            pm2 restart all || pm2 start ecosystem.config.js
            pm2 save
          EOF
